    .nav-cta:hover { background: var(--gold); color: var(--black); }

    .hero { min-height: 100vh; display: flex; align-items: center; position: relative; padding: 9rem 4rem 6rem; overflow: hidden; }
    .hero-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 70% 40%, rgba(201,168,76,.09) 0%, transparent 60%), radial-gradient(ellipse 50% 50% at 10% 80%, rgba(201,168,76,.05) 0%, transparent 55%), linear-gradient(160deg, #0a0a0a 0%, #111318 100%); }
    .hero-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(201,168,76,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,.04) 1px, transparent 1px); background-size: 60px 60px; mask-image: radial-gradient(ellipse 70% 70% at 60% 40%, black 20%, transparent 80%); }
    .hero-scan { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); animation: scan 5s linear infinite; opacity: .4; }
