    </div>

    <div class="contact-form-wrap reveal">
      <h3>Send Us a <em style="color:var(--gold);font-style:italic;">Message</em></h3>
      <div class="contact-form">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fname" placeholder="John Smith"/>
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="fphone" placeholder="416 000 0000"/>
          </div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="femail" placeholder="john@example.com"/>
        </div>
        <div class="form-group">
          <label>Service Needed</label>
          <select id="fservice">
            <option value="">Select a service…</option>
            <option>CCTV Camera Installation</option>
            <option>Network Setup & Access Points</option>
            <option>Low Voltage Rough-In</option>
            <option>Other / Not Sure</option>
          </select>
        </div>
        <div class="form-group">
          <label>Property Type</label>
          <select id="ftype">
            <option value="">Select property type…</option>
            <option>Residential Home</option>
            <option>Office / Business</option>
            <option>Retail Store</option>
            <option>Warehouse / Industrial</option>
            <option>New Construction</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tell Us More</label>
          <textarea id="fmsg" rows="3" placeholder="Number of cameras, areas to cover, any questions…"></textarea>
        </div>
        <button class="form-submit" onclick="submitForm()">Send Message →</button>
        <div class="success-msg" id="successMsg">✓ Opening your email app now! Or call us directly at 437-755-0023.</div>
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="footer-brand">
    <div class="footer-logo-main">APEX</div>
    <div class="footer-logo-sub">Surveillance Solutions Limited</div>
  </div>
  <p>© 2026 Apex Surveillance Solutions Limited. All rights reserved.</p>
  <p>Toronto & GTA &nbsp;|&nbsp; <a href="tel:4377550023">437-755-0023</a></p>
</footer>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  window.addEventListener('scroll', () => {
    document.querySelector('nav').style.padding = window.scrollY > 60 ? '1rem 4rem' : '1.4rem 4rem';
  });

  function submitForm() {
    const name = document.getElementById('fname').value.trim();
    const phone = document.getElementById('fphone').value.trim();
    const email = document.getElementById('femail').value.trim();
    const service = document.getElementById('fservice').value;
    const type = document.getElementById('ftype').value;
    const msg = document.getElementById('fmsg').value.trim();
    if (!name || !email) { alert('Please fill in your name and email.'); return; }
    const body = `Name: ${name}%0APhone: ${phone}%0AService: ${service}%0AProperty: ${type}%0AMessage: ${msg}`;
    window.location.href = `mailto:apexcctvgta@gmail.com?subject=Quote Request – Apex Surveillance&body=${body}`;
    document.getElementById('successMsg').style.display = 'block';
    ['fname','fphone','femail','fservice','ftype','fmsg'].forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
    setTimeout(() => document.getElementById('successMsg').style.display = 'none', 6000);
  }
</script>
</body>
</html>
