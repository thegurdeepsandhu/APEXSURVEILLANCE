    .hero-content { position: relative; max-width: 680px; }
    .hero-eyebrow { display: inline-flex; align-items: center; gap: .7rem; font-size: .75rem; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.8rem; opacity: 0; animation: fadeUp .8s .2s forwards; }
    .hero-eyebrow::before { content:''; display:block; width:28px; height:1px; background:var(--gold); }
    h1 { font-family: var(--font-display); font-size: clamp(3rem, 7vw, 5.8rem); font-weight: 300; line-height: 1.05; margin-bottom: 1.6rem; opacity: 0; animation: fadeUp .9s .35s forwards; }
    h1 em { font-style: italic; color: var(--gold); }
    .hero-sub { font-size: 1.05rem; color: var(--muted); line-height: 1.75; max-width: 480px; margin-bottom: 2.8rem; opacity: 0; animation: fadeUp .9s .5s forwards; }
    .hero-actions { display: flex; gap: 1.2rem; flex-wrap: wrap; opacity: 0; animation: fadeUp .9s .65s forwards; }
    .btn-primary { padding: .9rem 2.4rem; background: var(--gold); color: var(--black); border: none; cursor: pointer; font-family: var(--font-body); font-size: .85rem; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; text-decoration: none; transition: background .25s, transform .2s; display: inline-block; }
    .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }
    .btn-outline { padding: .9rem 2.4rem; background: transparent; color: var(--white); border: 1px solid var(--border); cursor: pointer; font-family: var(--font-body); font-size: .85rem; letter-spacing: .1em; text-transform: uppercase; text-decoration: none; transition: border-color .25s, color .25s; display: inline-block; }
